version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reengagement-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reengagement

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reengagement-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  app:
    build: .

    container_name: reengagement-api

    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    ports:
      - "5000:5000"

volumes:
  postgres_data: